<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemstone Bracelets — Veshannastro</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cinzel:wght@400;500;600&family=Vollkorn:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A84C;--gold-light:#F0D080;
  --maroon:#6E1423;--maroon-soft:#A6324A;
  --page-bg:#F4EFE6;--sidebar-bg:#EDE5D8;
  --sidebar-border:rgba(110,20,35,0.12);
  --card-bg:#FDFAF5;--grid-line:rgba(201,168,76,0.15);
  --ink:#1E1612;--ink2:#2E2420;--muted:#5A4A45;--muted2:#7A6A64;
}
html{background:var(--page-bg);font-family:'Jost',sans-serif;overflow-x:hidden;}
body{background:var(--page-bg);color:var(--ink);min-height:100vh;font-weight:500;}

/* ═══════════ LAYOUT ═══════════ */
.fx-wrap{display:grid;grid-template-columns:290px 1fr;min-height:100vh;max-width:1440px;margin:0 auto;}

/* ═══════════ SIDEBAR ═══════════ */
.fx-sidebar{
  background:var(--sidebar-bg);border-right:0.5px solid var(--sidebar-border);
  position:sticky;top:0;height:100vh;display:flex;flex-direction:column;overflow:hidden;
}
.fx-sb-canvas{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:.45;}
.fx-sb-top,.fx-sb-nav{position:relative;z-index:1;}

.fx-sb-top{padding:2.2rem 2rem 1.8rem;border-bottom:0.5px solid var(--sidebar-border);flex-shrink:0;}
.fx-sb-eyebrow{
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.55em;
  text-transform:uppercase;color:rgba(110,20,35,0.5);
  display:block;margin-bottom:.5rem;
  animation:eyebrow-breath 5s ease-in-out infinite;
}
@keyframes eyebrow-breath{0%,100%{letter-spacing:.55em;opacity:.5;}50%{letter-spacing:.72em;opacity:.85;}}
.fx-sb-brand{font-family:'Anton',sans-serif;font-size:1.45rem;color:var(--ink);font-weight:400;line-height:1.1;letter-spacing:.04em;text-transform:uppercase;}
.fx-sb-brand em{color:var(--maroon);font-style:normal;display:inline-block;animation:brand-em-glow 4s ease-in-out infinite;}
@keyframes brand-em-glow{0%,100%{opacity:1;}50%{opacity:.65;}}
.fx-sb-tagline{font-size:.8rem;color:var(--ink2);margin-top:.4rem;line-height:1.55;font-weight:600;letter-spacing:.01em;}

/* ornament sweep strip */
.fx-sb-ornament{
  display:flex;align-items:center;padding:.85rem 2rem;
  border-bottom:0.5px solid var(--sidebar-border);
  position:relative;z-index:1;overflow:hidden;flex-shrink:0;
}
.fx-sb-ornament::before{
  content:'';position:absolute;top:0;left:-60%;width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,0.22),transparent);
  animation:sweep 4s ease-in-out infinite;
}
@keyframes sweep{0%{left:-60%;}100%{left:140%;}}
.fx-sb-orn-sym{font-family:'Vollkorn',serif;font-size:.75rem;letter-spacing:.35em;color:rgba(110,20,35,0.25);display:inline-flex;gap:.4rem;}
.fx-sb-orn-sym span{display:inline-block;animation:lotus-spin 8s linear infinite;}
.fx-sb-orn-sym span:nth-child(2){animation-delay:-2.67s;}
.fx-sb-orn-sym span:nth-child(3){animation-delay:-5.33s;}
@keyframes lotus-spin{0%,100%{transform:rotate(0deg) scale(1);opacity:.25;}33%{transform:rotate(15deg) scale(1.3);opacity:.6;}66%{transform:rotate(-10deg) scale(.9);opacity:.3;}}

/* nav */
.fx-sb-nav{flex:1;overflow-y:auto;padding:1.3rem 0 2rem;}
.fx-sb-nav-label{font-family:'Cinzel',serif;font-size:6.5px;letter-spacing:.55em;text-transform:uppercase;color:rgba(110,20,35,0.35);padding:.4rem 2rem;display:block;margin-bottom:.4rem;}

.fx-sb-item{
  display:flex;align-items:center;gap:1rem;padding:1rem 2rem;
  cursor:pointer;border-left:2.5px solid transparent;
  position:relative;overflow:hidden;transition:border-color .4s;
}
.fx-sb-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:0;background:rgba(110,20,35,0.05);transition:width .45s cubic-bezier(.22,1,.36,1);}
.fx-sb-item:hover::before{width:100%;}
.fx-sb-item:hover{border-left-color:rgba(110,20,35,0.2);}
.fx-sb-item.active{border-left-color:var(--maroon);}
.fx-sb-item.active::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2.5px;background:var(--maroon);animation:border-glow 2.5s ease-in-out infinite;box-shadow:0 0 8px rgba(110,20,35,0.6);}
@keyframes border-glow{0%,100%{box-shadow:0 0 6px rgba(110,20,35,0.5);}50%{box-shadow:0 0 18px rgba(201,168,76,0.75);}}
.fx-sb-item.active .fx-sb-bg{position:absolute;inset:0;background:linear-gradient(90deg,rgba(110,20,35,0.07) 0%,rgba(201,168,76,0.04) 60%,transparent 100%);animation:active-shimmer 3.5s ease-in-out infinite;}
@keyframes active-shimmer{0%,100%{opacity:1;}50%{opacity:.5;}}

.fx-sb-glyph{font-family:'Anton',sans-serif;font-size:2rem;font-weight:400;line-height:1;color:rgba(110,20,35,0.1);flex-shrink:0;width:2.4rem;text-align:center;position:relative;z-index:1;transition:color .4s,transform .5s cubic-bezier(.34,1.56,.64,1);}
.fx-sb-item:hover .fx-sb-glyph{color:rgba(110,20,35,0.25);transform:scale(1.15) rotate(-4deg);}
.fx-sb-item.active .fx-sb-glyph{color:rgba(110,20,35,0.35);animation:glyph-pulse 3s ease-in-out infinite;}
@keyframes glyph-pulse{0%,100%{transform:scale(1) rotate(0deg);color:rgba(110,20,35,0.35);}50%{transform:scale(1.12) rotate(-3deg);color:rgba(201,168,76,0.6);}}

.fx-sb-txt{position:relative;z-index:1;flex:1;}
.fx-sb-name{font-family:'Jost',sans-serif;font-size:1rem;color:var(--ink);font-weight:700;line-height:1.1;transition:color .35s,transform .35s;}
.fx-sb-item:hover .fx-sb-name,.fx-sb-item.active .fx-sb-name{color:var(--maroon);transform:translateX(3px);}
.fx-sb-hint{font-size:.73rem;color:var(--ink2);margin-top:.18rem;letter-spacing:.01em;font-weight:600;transition:opacity .35s;}
.fx-sb-item:hover .fx-sb-hint{opacity:.7;}

.fx-sb-count{margin-left:auto;font-family:'Cinzel',serif;font-size:7px;letter-spacing:.25em;color:rgba(110,20,35,0.35);background:rgba(110,20,35,0.07);border:0.5px solid rgba(110,20,35,0.14);padding:3px 8px;border-radius:2px;position:relative;z-index:1;transition:background .35s,color .35s,border-color .35s;}
.fx-sb-item:hover .fx-sb-count,.fx-sb-item.active .fx-sb-count{background:rgba(110,20,35,0.14);color:rgba(110,20,35,0.65);border-color:rgba(110,20,35,0.28);}

.fx-sb-divider{height:0.5px;background:var(--sidebar-border);margin:.5rem 2rem;position:relative;z-index:1;}

/* bottom lotus */
.fx-sb-lotus{text-align:center;padding:1.4rem 0 .6rem;position:relative;z-index:1;}
.fx-sb-lotus-inner{display:inline-flex;gap:.9rem;align-items:center;}
.fx-sb-lotus-dot{width:5px;height:5px;border-radius:50%;background:rgba(110,20,35,0.2);display:inline-block;animation:dot-wave 2.4s ease-in-out infinite;}
.fx-sb-lotus-dot:nth-child(2){animation-delay:.4s;}
.fx-sb-lotus-dot:nth-child(3){animation-delay:.8s;}
.fx-sb-lotus-sym2{font-family:'Vollkorn',serif;font-size:.85rem;color:rgba(110,20,35,0.22);letter-spacing:.3em;animation:sym-fade 3s ease-in-out infinite;}
@keyframes dot-wave{0%,100%{transform:translateY(0) scale(1);opacity:.2;}50%{transform:translateY(-5px) scale(1.7);opacity:.55;}}
@keyframes sym-fade{0%,100%{opacity:.22;letter-spacing:.3em;}50%{opacity:.5;letter-spacing:.5em;}}

/* ═══════════ RIGHT PANEL ═══════════ */
.fx-right{padding:0;overflow-y:auto;overflow-x:hidden;background:var(--page-bg);height:100vh;position:relative;}

/* section header */
.fx-section-head{padding:3rem 3rem 0;display:grid;grid-template-columns:auto 1fr;align-items:start;gap:1.8rem;max-width:1100px;}
.fx-big-initial{font-family:'Anton',sans-serif;font-size:6rem;line-height:.85;font-weight:400;color:rgba(110,20,35,0.07);letter-spacing:.05em;margin-top:-.3rem;user-select:none;flex-shrink:0;}
.fx-head-eyebrow{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.55em;text-transform:uppercase;color:var(--maroon);display:block;margin-bottom:.5rem;font-weight:600;}
.fx-head-title{font-family:'Anton',sans-serif;font-size:clamp(2.2rem,3.5vw,3.2rem);color:var(--ink);font-weight:400;line-height:1.0;letter-spacing:.04em;text-transform:uppercase;margin-bottom:.45rem;}
.fx-head-title em{color:var(--maroon);font-style:normal;}
.fx-head-desc{font-size:.9rem;color:var(--ink);line-height:1.75;font-weight:600;max-width:520px;}

/* lotus divider */
.fx-lotus-row{display:flex;align-items:center;gap:1.2rem;padding:1.8rem 3rem 0;max-width:1100px;}
.fx-lotus-row::before,.fx-lotus-row::after{content:'';flex:1;height:0.5px;background:linear-gradient(90deg,transparent,rgba(110,20,35,0.18),transparent);}
.fx-lotus-sym{font-family:'Vollkorn',serif;color:rgba(110,20,35,0.3);font-size:.95rem;letter-spacing:.3em;white-space:nowrap;}

/* ═══════════════════════════════════════════════
   SIDE-SCROLL RAIL WITH TWO PARALLAX LAYERS
═══════════════════════════════════════════════ */
.fx-scroll-stage{
  padding:2rem 3rem 1.5rem;
  position:relative;
  overflow:hidden; /* clips the back layer */
}

/* scroll arrows */
.fx-scroll-btn{
  position:absolute;top:50%;z-index:10;
  transform:translateY(-50%);
  width:40px;height:40px;border-radius:50%;
  background:var(--card-bg);border:0.5px solid rgba(110,20,35,0.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;color:var(--maroon);
  box-shadow:0 4px 16px rgba(15,13,9,0.1);
  transition:background .3s,transform .3s,box-shadow .3s;
  user-select:none;
}
.fx-scroll-btn:hover{background:#fff;box-shadow:0 6px 22px rgba(110,20,35,0.15);transform:translateY(-50%) scale(1.08);}
.fx-scroll-btn.prev{left:1rem;}
.fx-scroll-btn.next{right:1rem;}

/* ── LAYER BACK (ghost shadow rail — scrolls slower) ── */
.fx-layer-back{
  position:absolute;
  top:2.8rem;left:3.5rem;right:3.5rem;
  pointer-events:none;z-index:0;
  will-change:transform;
  overflow:hidden;
}
.fx-shadow-rail{
  display:flex;gap:14px;
  /* width driven by JS to match front rail */
}
.fx-shadow-cell{
  flex-shrink:0;
  border-radius:6px;
  background:rgba(110,20,35,0.04);
  border:0.5px solid rgba(110,20,35,0.07);
  opacity:.55;
  filter:blur(1.5px);
}

/* ── LAYER FRONT (real scroll rail) ── */
.fx-layer-front{position:relative;z-index:1;}

.fx-rail{
  display:flex;gap:14px;
  overflow-x:auto;scroll-snap-type:x mandatory;
  scrollbar-width:none;-ms-overflow-style:none;
  padding-bottom:4px;
  scroll-behavior:smooth;
}
.fx-rail::-webkit-scrollbar{display:none;}

/* ─── CARD ─── */
.fx-card{
  flex-shrink:0;
  width:210px;
  background:var(--card-bg);
  border:0.5px solid var(--grid-line);
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  scroll-snap-align:start;
  display:flex;flex-direction:column;
  transition:transform .42s cubic-bezier(.22,1,.36,1),box-shadow .42s,background .3s;
  animation:card-enter .5s cubic-bezier(.22,1,.36,1) both;
}
/* stagger entrance */
.fx-card:nth-child(1){animation-delay:.04s;}
.fx-card:nth-child(2){animation-delay:.10s;}
.fx-card:nth-child(3){animation-delay:.16s;}
.fx-card:nth-child(4){animation-delay:.22s;}
.fx-card:nth-child(5){animation-delay:.28s;}
.fx-card:nth-child(6){animation-delay:.34s;}
.fx-card:nth-child(7){animation-delay:.40s;}
.fx-card:nth-child(8){animation-delay:.46s;}
.fx-card:nth-child(9){animation-delay:.52s;}
.fx-card:nth-child(10){animation-delay:.58s;}
.fx-card:nth-child(11){animation-delay:.64s;}
.fx-card:nth-child(12){animation-delay:.70s;}
@keyframes card-enter{from{opacity:0;transform:translateY(20px) scale(.96);}to{opacity:1;transform:none;}}

.fx-card:hover{
  transform:translateY(-7px) scale(1.02);
  box-shadow:0 20px 48px rgba(110,20,35,0.13),0 4px 12px rgba(201,168,76,0.1);
  background:#fff;z-index:3;
}

/* shimmer sweep on hover */
.fx-card::before{
  content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;
  background:linear-gradient(105deg,transparent 40%,rgba(201,168,76,0.14) 50%,transparent 60%);
  transition:left .55s ease;z-index:0;pointer-events:none;
}
.fx-card:hover::before{left:140%;}

/* top-edge gold reveal */
.fx-card-top-line{
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),var(--maroon),var(--gold));
  transform:scaleX(0);transform-origin:center;
  transition:transform .5s cubic-bezier(.22,1,.36,1);z-index:4;
}
.fx-card:hover .fx-card-top-line{transform:scaleX(1);}

/* bottom maroon sweep */
.fx-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--maroon),var(--gold));
  transform:scaleX(0);transform-origin:left;
  transition:transform .48s cubic-bezier(.22,1,.36,1);
}
.fx-card:hover::after{transform:scaleX(1);}

/* image area */
.fx-card-img{
  width:100%;aspect-ratio:1;overflow:hidden;position:relative;flex-shrink:0;
  background:linear-gradient(135deg,#EDE6D8,#F5F0E8);
}
.fx-card-img img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .55s cubic-bezier(.22,1,.36,1),filter .4s;
}
.fx-card:hover .fx-card-img img{transform:scale(1.09) rotate(-1deg);}
.fx-card-img.is-swapping img{filter:saturate(1.08) contrast(1.05) brightness(1.02);}

/* emoji fallback (shown when img errors) */
.fx-card-emoji{
  position:absolute;inset:0;
  display:none;align-items:center;justify-content:center;
  font-size:3rem;
}
.fx-card-img.img-err .fx-card-emoji{display:flex;}
.fx-card-img.img-err img{display:none;}

/* stone glow overlay */
.fx-card-glow{
  position:absolute;inset:0;opacity:.55;pointer-events:none;
  transition:opacity .4s;
}
.fx-card:hover .fx-card-glow{opacity:.7;}

/* badge */
.fx-badge{
  position:absolute;top:.8rem;left:.8rem;
  background:var(--maroon);color:#F0D4BE;
  font-family:'Cinzel',serif;font-size:6px;letter-spacing:.32em;
  text-transform:uppercase;padding:3px 8px;border-radius:2px;z-index:2;
  font-weight:600;animation:badge-pulse 3s ease-in-out infinite;
}
@keyframes badge-pulse{0%,100%{box-shadow:0 0 0 0 rgba(110,20,35,0.4);}50%{box-shadow:0 0 0 5px rgba(110,20,35,0);}}

.fx-premium-ribbon{
  position:absolute;top:.8rem;right:.8rem;
  background:linear-gradient(135deg,var(--gold),#a87c2a);
  color:#1E1612;font-family:'Cinzel',serif;font-size:6px;letter-spacing:.3em;
  text-transform:uppercase;padding:3px 8px;border-radius:2px;z-index:2;font-weight:700;
}

/* card body */
.fx-card-body{padding:1.1rem 1.2rem 1.3rem;display:flex;flex-direction:column;flex:1;position:relative;z-index:1;}

.fx-stone{
  font-family:'Cinzel',serif;font-size:6.8px;letter-spacing:.4em;text-transform:uppercase;
  color:var(--maroon);opacity:.8;display:block;margin-bottom:.32rem;font-weight:600;
  transition:letter-spacing .4s,opacity .4s;
}
.fx-card:hover .fx-stone{letter-spacing:.58em;opacity:1;}

.fx-name{
  font-family:'Anton',sans-serif;font-size:.9rem;font-weight:400;
  color:var(--ink);line-height:1.2;margin-bottom:.35rem;
  letter-spacing:.02em;text-transform:uppercase;
  transition:color .35s,transform .4s cubic-bezier(.22,1,.36,1);
}
.fx-card:hover .fx-name{color:var(--maroon);transform:translateX(3px);}

.fx-benefit{
  font-size:.72rem;color:var(--muted);line-height:1.55;font-weight:600;
  margin-bottom:.6rem;flex:1;
}

.fx-price-row{
  display:flex;align-items:baseline;gap:.4rem;
  margin-top:auto;padding-top:.55rem;flex-wrap:wrap;
  border-top:0.5px solid rgba(201,168,76,0.22);
  transition:border-color .4s;
}
.fx-card:hover .fx-price-row{border-color:rgba(110,20,35,0.2);}
.fx-price{font-size:1rem;color:var(--maroon);font-weight:700;transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.fx-card:hover .fx-price{transform:scale(1.08);}
.fx-was{font-size:.75rem;color:#8A7068;text-decoration:line-through;font-weight:600;}
.fx-off{
  font-family:'Cinzel',serif;font-size:6px;letter-spacing:.18em;text-transform:uppercase;
  background:rgba(201,168,76,0.15);border:0.5px solid rgba(201,168,76,0.35);
  color:rgba(110,20,35,0.75);font-weight:700;padding:2px 6px;border-radius:2px;
  margin-left:auto;transition:background .35s,color .35s;
}
.fx-card:hover .fx-off{background:var(--maroon);color:#F0D4BE;border-color:var(--maroon);}

/* add-to-cart button (hidden until hover) */
.fx-card-cta{
  margin-top:.8rem;width:100%;
  background:var(--maroon);color:#F0D4BE;
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.35em;text-transform:uppercase;
  border:none;padding:.65rem;border-radius:3px;cursor:pointer;
  font-weight:700;opacity:0;transform:translateY(6px);
  transition:opacity .35s,transform .35s,background .3s;
}
.fx-card:hover .fx-card-cta{opacity:1;transform:translateY(0);}
.fx-card-cta:hover{background:var(--maroon-soft);}

/* scroll indicator dots */
.fx-scroll-dots{
  display:flex;justify-content:center;gap:6px;padding:.8rem 3rem 2.5rem;
}
.fx-scroll-dot{
  width:5px;height:5px;border-radius:50%;
  background:rgba(110,20,35,0.15);border:none;padding:0;cursor:pointer;
  transition:background .3s,transform .3s;
}
.fx-scroll-dot.active{background:var(--maroon);transform:scale(1.5);}

/* section count line */
.fx-count-line{
  font-family:'Cinzel',serif;font-size:7px;letter-spacing:.45em;
  text-transform:uppercase;color:rgba(110,20,35,0.4);
  padding:0 3rem .5rem;max-width:1100px;font-weight:600;
}

/* responsive */
@media(max-width:960px){
  .fx-wrap{grid-template-columns:1fr;}
  .fx-sidebar{position:static;height:auto;border-right:none;border-bottom:0.5px solid var(--sidebar-border);}
  .fx-right{height:auto;overflow-y:visible;}
  .fx-sb-nav{display:flex;padding:0;}
  .fx-sb-item{flex-direction:column;gap:.15rem;padding:.7rem 1rem;border-left:none;border-bottom:2px solid transparent;}
  .fx-sb-item.active{border-bottom-color:var(--maroon);border-left:none;}
  .fx-sb-item.active::after{display:none;}
  .fx-sb-glyph,.fx-sb-count,.fx-sb-hint,.fx-sb-lotus,.fx-sb-ornament{display:none;}
  .fx-section-head{padding:2rem 1.5rem 0;}
  .fx-scroll-stage{padding:1.5rem 1.5rem 1rem;}
  .fx-card{width:175px;}
  .fx-layer-back{display:none;}
  .fx-big-initial{font-size:4rem;}
  .fx-scroll-btn.prev{left:.3rem;}
  .fx-scroll-btn.next{right:.3rem;}
}

/* ═══════════ ADD-TO-CART ANIMATION ═══════════ */
.fx-card-cta{position:relative;overflow:hidden;}
.fx-card-cta .cta-label{transition:opacity .18s ease;}
.fx-card-cta .cta-spin{position:absolute;inset:0;margin:auto;width:18px;height:18px;border:2.4px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;opacity:0;}
.fx-card-cta .cta-tick{position:absolute;inset:0;margin:auto;width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round;opacity:0;}
.fx-card-cta .cta-tick path{stroke-dasharray:26;stroke-dashoffset:26;}
.fx-card-cta.is-loading{pointer-events:none;}
.fx-card-cta.is-loading .cta-label{opacity:0;}
.fx-card-cta.is-loading .cta-spin{opacity:1;animation:fxspin .7s linear infinite;}
.fx-card-cta.is-done{pointer-events:none;background:var(--maroon)!important;color:#fff!important;}
.fx-card-cta.is-done .cta-label{opacity:0;}
.fx-card-cta.is-done .cta-tick{opacity:1;animation:fxpop .34s ease;}
.fx-card-cta.is-done .cta-tick path{animation:fxdraw .42s .06s ease forwards;}
@keyframes fxspin{to{transform:rotate(360deg);}}
@keyframes fxdraw{to{stroke-dashoffset:0;}}

/* ═════════════════════════════════════
   SIDEBAR CANVAS — floating particles
═════════════════════════════════════ */
(function(){
  var canvas=document.getElementById('sb-canvas');
  if(!canvas)return;
  var ctx=canvas.getContext('2d'),W,H,particles=[];
  function resize(){W=canvas.width=canvas.offsetWidth;H=canvas.height=canvas.offsetHeight;}
  resize();window.addEventListener('resize',resize);
  for(var i=0;i<28;i++){
    particles.push({x:Math.random()*100,y:Math.random()*100,r:Math.random()*1.8+.5,
      vx:(Math.random()-.5)*.12,vy:(Math.random()-.5)*.1,
      opacity:Math.random()*.35+.08,pulse:Math.random()*Math.PI*2,
      pulseSpeed:Math.random()*.012+.006,shape:Math.random()>.65?'diamond':'circle'});
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    var now=performance.now()/1000;
    particles.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-2)p.x=102;if(p.x>102)p.x=-2;
      if(p.y<-2)p.y=102;if(p.y>102)p.y=-2;
      p.pulse+=p.pulseSpeed;
      var px=p.x/100*W,py=p.y/100*H;
      var op=p.opacity*(0.6+0.4*Math.sin(p.pulse));
      var sz=p.r*(0.8+0.4*Math.sin(p.pulse*1.3));
      ctx.save();ctx.globalAlpha=op;
      if(p.shape==='diamond'){
        ctx.translate(px,py);ctx.rotate(Math.PI/4+Math.sin(now*.3)*.3);
        var s=sz*2.2;ctx.fillStyle='rgba(110,20,35,0.9)';ctx.fillRect(-s/2,-s/2,s,s);
      }else{
        ctx.beginPath();ctx.arc(px,py,sz,0,Math.PI*2);ctx.fillStyle='rgba(201,168,76,0.8)';ctx.fill();
      }
      ctx.restore();
    });
    for(var i=0;i<particles.length;i++){
      for(var j=i+1;j<particles.length;j++){
        var a=particles[i],b=particles[j];
        var dx=(a.x-b.x)/100*W,dy=(a.y-b.y)/100*H;
        var dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<60){ctx.save();ctx.globalAlpha=(1-dist/60)*0.07;ctx.strokeStyle='rgba(110,20,35,1)';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(a.x/100*W,a.y/100*H);ctx.lineTo(b.x/100*W,b.y/100*H);ctx.stroke();ctx.restore();}
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ═════════════════════════════════════
   IMAGE FALLBACK CHAIN: webp → jpg → jpeg → png
   If none load, shows the stone emoji instead
═════════════════════════════════════ */
var FX_IMG_EXTS=['webp','jpg','jpeg','png'];
function fxImgFallback(img,sku){
  var cur=img.src.split('.').pop().toLowerCase().split('?')[0];
  var idx=FX_IMG_EXTS.indexOf(cur)+1;
  if(idx>0&&idx<FX_IMG_EXTS.length){
    img.onerror=function(){fxImgFallback(img,sku);};
    img.src='images/bracelets/'+sku+'.'+FX_IMG_EXTS[idx];
  }else{
    img.onerror=null;
    var wrap=img.closest('.fx-card-img');
    if(wrap)wrap.classList.add('img-err');
  }
}

function fxCardPhotoHover(wrap,sku,on){
  var img=wrap&&wrap.querySelector('img');
  if(!img||wrap.classList.contains('img-err'))return;
  if(on){
    img.dataset.returnSrc=img.dataset.returnSrc||img.getAttribute('src')||('images/bracelets/'+sku+'.webp');
    wrap.classList.add('is-swapping');
    var tries=[
      'images/bracelets/'+sku+'-1.webp',
      'images/bracelets/'+sku+'-1.png',
      'images/bracelets/'+sku+'-1.jpg',
      'images/bracelets/'+sku+'-1.jpeg'
    ];
    var i=0;
    function tryNext(){
      if(!wrap.classList.contains('is-swapping'))return;
      if(i>=tries.length){
        img.onerror=function(){fxImgFallback(img,sku);};
        img.src=img.dataset.returnSrc||('images/bracelets/'+sku+'.webp');
        wrap.classList.remove('is-swapping');
        return;
      }
      img.onerror=function(){i++;tryNext();};
      img.src=tries[i];
    }
    tryNext();
  }else{
    wrap.classList.remove('is-swapping');
    img.onerror=function(){fxImgFallback(img,sku);};
    img.src=img.dataset.returnSrc||('images/bracelets/'+sku+'.webp');
  }
}

/* ═════════════════════════════════════
   TWO-LAYER PARALLAX SIDE-SCROLL
   Front rail scrolls normally (user driven)
   Back layer drifts at 35% of front scroll speed
   — creating visible depth separation
═════════════════════════════════════ */
var scrollRAF=null;
function initScrollRail(){
  var rail=document.getElementById('fx-rail');
  var back=document.getElementById('layer-back');
  var btnPrev=document.getElementById('btn-prev');
  var btnNext=document.getElementById('btn-next');
  var dotsEl=document.getElementById('scroll-dots');
  if(!rail)return;

  // card width + gap
  var CARD_W=210+14;

  // build dots
  var totalCards=rail.children.length;
  var dotsHtml='';
  for(var i=0;i<totalCards;i++){dotsHtml+='<button class="fx-scroll-dot'+(i===0?' active':'')+'\" data-dot="'+i+'"></button>';}
  if(dotsEl)dotsEl.innerHTML=dotsHtml;

  // update dots
  function updateDots(){
    var idx=Math.round(rail.scrollLeft/CARD_W);
    var dots=dotsEl?dotsEl.querySelectorAll('.fx-scroll-dot'):[];
    dots.forEach(function(d,i){d.classList.toggle('active',i===idx);});
  }

  // parallax on scroll
  rail.addEventListener('scroll',function(){
    if(scrollRAF)cancelAnimationFrame(scrollRAF);
    scrollRAF=requestAnimationFrame(function(){
      var sl=rail.scrollLeft;
      // back layer drifts at 35% speed → visible depth gap
      if(back)back.style.transform='translateX(-'+Math.round(sl*0.35)+'px)';
      updateDots();
      // show/hide arrows
      if(btnPrev)btnPrev.style.opacity=sl>10?'1':'0.3';
      if(btnNext)btnNext.style.opacity=(rail.scrollLeft+rail.clientWidth<rail.scrollWidth-10)?'1':'0.3';
    });
  },{passive:true});

  // arrow buttons
  function scrollBy(dir){
    rail.scrollBy({left:dir*CARD_W*2,behavior:'smooth'});
  }
  if(btnPrev)btnPrev.addEventListener('click',function(){scrollBy(-1);});
  if(btnNext)btnNext.addEventListener('click',function(){scrollBy(1);});

  // dot clicks
  if(dotsEl)dotsEl.addEventListener('click',function(e){
    var dot=e.target.closest('[data-dot]');
    if(!dot)return;
    rail.scrollTo({left:parseInt(dot.dataset.dot)*CARD_W,behavior:'smooth'});
  });

  // initial arrow state
  if(btnPrev)btnPrev.style.opacity='0.3';

  // match shadow-rail width to real rail scroll width
  var shadowRail=document.getElementById('shadow-rail');
  if(shadowRail)shadowRail.style.width=rail.scrollWidth+'px';
}

        '<p id="fx-success-msg"></p>'+
        '<a id="fx-success-wa" class="fx-cd-checkout" target="_top" rel="noopener">Share order on WhatsApp</a>'+
        '<button class="fx-cd-back" id="fx-success-close" type="button" style="margin-top:.8rem">Close</button>'+
      '</div>'+
    '</div>'+
    /* ── 2-item celebration overlay ── */
    '<div class="fx-celebrate" id="fx-celebrate">'+
      '<div class="fx-celebrate-card">'+
        '<div class="fx-confetti" id="fx-confetti"></div>'+
        '<div class="fx-gift" id="fx-gift">'+
          '<div class="fx-gift-lid"><span class="fx-gift-bow"></span></div>'+
          '<div class="fx-gift-box"><span class="fx-gift-ribbon"></span></div>'+
        '</div>'+
        '<div class="fx-reward">'+
          '<div class="fx-reward-badge">10% OFF</div>'+
          '<h3>HAPPY10 unlocked!</h3>'+
          '<p>Your 2-bracelet discount has been applied automatically.</p>'+
          '<div class="fx-upsell">'+
            '<div class="fx-upsell-head">Want <b>15% OFF</b> instead?</div>'+
            '<p>Ask Maya for a free reading and unlock <b>NEW15</b> \u2014 an even bigger discount.</p>'+
            '<button class="fx-maya-btn" id="fx-maya-btn">\u2728 Chat with Maya \u2014 get 15% off</button>'+
          '</div>'+
          '<button class="fx-reward-continue" id="fx-reward-continue">Continue with 10% off</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  document.body.insertAdjacentHTML('beforeend',html);
  var co=document.getElementById('fx-cd-checkout'); if(co)co.addEventListener('click',fxStartCheckout);
  var bk=document.getElementById('fx-cd-back'); if(bk)bk.addEventListener('click',fxBackToCart);
  var pay=document.getElementById('fx-pay'); if(pay)pay.addEventListener('click',fxPay);
  var sc=document.getElementById('fx-success-close'); if(sc)sc.addEventListener('click',function(){ fxResetPanes(); closeCart(); });
  var pin=document.getElementById('fx-pin'); if(pin)pin.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');});
  var ph=document.getElementById('fx-phone'); if(ph)ph.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');});
  var mb=document.getElementById('fx-maya-btn'); if(mb)mb.addEventListener('click',function(){ try{(window.top||window).location.href='index.html?openMaaya=1&coupon=NEW15#vesha-chat';}catch(e){window.location.href='index.html#vesha-chat';} });
  var rc=document.getElementById('fx-reward-continue'); if(rc)rc.addEventListener('click',fxCelebrateClose);
}
function openCart(){var o=document.getElementById('fx-cart-overlay'),d=document.getElementById('fx-cart-drawer');if(o)o.classList.add('open');if(d)d.classList.add('open');}
function closeCart(){var o=document.getElementById('fx-cart-overlay'),d=document.getElementById('fx-cart-drawer');if(o)o.classList.remove('open');if(d)d.classList.remove('open');}
function cartCountTotal(){var n=0;for(var s in fxCart)n+=fxCart[s];return n;}
function updateFab(pop){
  var num=document.getElementById('fx-cart-num');if(!num)return;
  var t=cartCountTotal();num.textContent=t;num.classList.toggle('show',t>0);
  if(pop){num.classList.remove('pop');void num.offsetWidth;num.classList.add('pop');}
}
function renderCart(){
  var box=document.getElementById('fx-cd-items'),foot=document.getElementById('fx-cd-foot');if(!box)return;
  var cnt=document.getElementById('fx-cd-count'); if(cnt){var n=cartCountTotal();cnt.textContent=n+(n===1?' item':' items');}
  var skus=Object.keys(fxCart);
  if(!skus.length){box.innerHTML='<div class="fx-cd-empty"><div class="fx-cd-empty-ic">\uD83D\uDC8E</div>Your cart is empty.<br>Add a bracelet to begin.</div>';if(foot)foot.style.display='none';return;}
  var total=0,rows='';
  skus.forEach(function(s){
    var rec=ALL_PRODUCTS[s];if(!rec)return;var p=rec.p,q=fxCart[s];total+=p.price*q;
    var imgSrc='images/bracelets/'+s+'.webp';
    var glow='radial-gradient(circle at 40% 35%,'+fxHexA(rec.color,.85)+','+fxHexA(rec.color,.35)+')';
    rows+=''+
      '<div class="fx-cd-line" data-sku="'+s+'">'+
        '<div class="fx-cd-thumb" style="background-image:url(\''+imgSrc+'\'),'+glow+';">'+'</div>'+
        '<div class="fx-cd-info">'+
          '<div class="fx-cd-name">'+p.name+'</div>'+
          '<div class="fx-cd-price">'+money(p.price)+'</div>'+
          '<div class="fx-cd-qty"><button onclick="cartQty(\''+s+'\',-1)" aria-label="Decrease quantity">&minus;</button><span>'+q+'</span><button onclick="cartQty(\''+s+'\',1)" aria-label="Increase quantity">+</button></div>'+
        '</div>'+
        '<button class="fx-cd-remove" onclick="cartRemove(\''+s+'\')">Remove</button>'+
      '</div>';
  });
  box.innerHTML=rows;
  if(foot){
    foot.style.display='block';
    var sub=fxSubtotal(), disc=fxDiscountAmt(), tot=fxTotal();
    var subline=document.getElementById('fx-cd-subline'), subVal=document.getElementById('fx-cd-sub-val'),
        discline=document.getElementById('fx-cd-discline'), discVal=document.getElementById('fx-cd-disc-val'),
        discLabel=document.getElementById('fx-cd-disc-label'), tv=document.getElementById('fx-cd-total-val'),
        tag=document.getElementById('fx-coupon-tag');
    if(disc>0){
      if(subline){subline.style.display='flex';} if(subVal)subVal.textContent=money(sub);
      if(discline){discline.style.display='flex';} if(discVal)discVal.textContent='\u2212 '+money(disc);
      if(discLabel)discLabel.textContent=fxCoupon+' ('+(fxCoupon==='NEW15'?'15':'10')+'% off)';
      if(tag){tag.style.display='block';tag.textContent='\uD83C\uDF89 '+fxCoupon+' applied \u2014 you saved '+money(disc)+'!';}
    }else{
      if(subline)subline.style.display='none'; if(discline)discline.style.display='none'; if(tag)tag.style.display='none';
    }
    if(tv)tv.textContent=money(tot);
  }
}
function cartQty(sku,delta){fxCart[sku]=(fxCart[sku]||0)+delta;if(fxCart[sku]<=0)delete fxCart[sku];updateFab(true);renderCart();}
function cartRemove(sku){delete fxCart[sku];updateFab(true);renderCart();}
function fxResetPanes(){
  var items=document.getElementById('fx-cd-items'),foot=document.getElementById('fx-cd-foot'),
      form=document.getElementById('fx-cd-form'),succ=document.getElementById('fx-cd-success'),
      title=document.getElementById('fx-cd-title');
  if(items)items.style.display='';
  if(foot)foot.style.display=Object.keys(fxCart).length?'block':'none';
  if(form)form.style.display='none';
  if(succ)succ.style.display='none';
  if(title)title.textContent='Your Cart';
}
function fxStartCheckout(){
  if(!Object.keys(fxCart).length)return;
  var items=document.getElementById('fx-cd-items'),foot=document.getElementById('fx-cd-foot'),
      form=document.getElementById('fx-cd-form'),title=document.getElementById('fx-cd-title'),
      pay=document.getElementById('fx-pay'),err=document.getElementById('fx-form-err');
  if(items)items.style.display='none';
  if(foot)foot.style.display='none';
  if(form)form.style.display='block';
  if(title)title.textContent='Checkout';
  if(err)err.classList.remove('show');
  if(pay)pay.textContent='Pay '+money(fxTotal())+' with Razorpay';
}
function fxBackToCart(){ fxResetPanes(); }
function fxField(id){var el=document.getElementById(id);return el?String(el.value||'').trim():'';}
function fxValidate(){
  var ok=true;
  [['fx-name',/.+/],['fx-phone',/^[6-9]\d{9}$/],['fx-email',/^[^@\s]+@[^@\s]+\.[^@\s]+$/],
   ['fx-addr',/.+/],['fx-city',/.+/],['fx-state',/.+/],['fx-pin',/^\d{6}$/]].forEach(function(p){
    var el=document.getElementById(p[0]),v=el?String(el.value||'').trim():'',valid=p[1].test(v);
    if(el)el.style.borderColor=valid?'':'#c0392b';
    if(!valid)ok=false;
  });
  var err=document.getElementById('fx-form-err'); if(err)err.classList.toggle('show',!ok);
  return ok;
}
function fxCustomer(){
  return {name:fxField('fx-name'),phone:fxField('fx-phone'),email:fxField('fx-email'),
    address1:fxField('fx-addr'),address2:'',city:fxField('fx-city'),state:fxField('fx-state'),
    pincode:fxField('fx-pin'),country:'India',notes:''};
}
function fxShowSuccess(order,msg){
  var form=document.getElementById('fx-cd-form'),succ=document.getElementById('fx-cd-success'),
      m=document.getElementById('fx-success-msg'),wa=document.getElementById('fx-success-wa'),
      title=document.getElementById('fx-cd-title');
  if(form)form.style.display='none';
  if(succ)succ.style.display='block';
  if(m)m.textContent=msg;
  if(wa)wa.href=fxWaLink(order);
  if(title)title.textContent='Thank you';
}
function fxPay(){
  if(!fxValidate())return;
  var c=fxCustomer(), pay=document.getElementById('fx-pay');

  /* ── FULL-PAGE + SERVER-VERIFIED: create a Razorpay-hosted payment link on the
       backend and redirect the whole window to it. Razorpay's page is full screen
       (never boxed in the iframe) and the backend webhook verifies the payment. ── */
  if(FX_CONFIG.cartLinkEndpoint){
    if(pay){pay.disabled=true;pay.textContent='Creating secure checkout\u2026';}
    var pendingOrder=fxBuildOrder(c,'','Pending payment'); fxLogOrder(pendingOrder);
    fetch(FX_CONFIG.cartLinkEndpoint,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        order_id:pendingOrder.order_id,
        items:fxItems().map(function(i){return {sku:i.sku,qty:i.qty};}),
        coupon:fxCoupon||'',
        description:pendingOrder.item_summary.slice(0,250),
        customer:{name:c.name,email:c.email,contact:'+91'+c.phone,
          address:c.address1,city:c.city,state:c.state,pincode:c.pincode},
        callback_url:FX_CONFIG.thankYouUrl
      })
    })
    .then(function(r){return r.json().then(function(d){return {status:r.status,data:d};});})
    .then(function(res){
      if(res.data&&res.data.short_url){ try{(window.top||window).location.href=res.data.short_url;}catch(e){window.location.href=res.data.short_url;} return; }
      throw new Error('no link');
    })
    .catch(function(){
      if(pay){pay.disabled=false;pay.textContent='Pay '+money(fxTotal())+' with Razorpay';}
      alert('Couldn\u2019t start secure checkout. Please try again, or contact us on WhatsApp.');
    });
    return;
  }

  /* ── FALLBACK: in-frame Razorpay popup (used until the backend URL is set) ── */
  if(location.protocol==='file:'){ alert('Payment can\u2019t run from a local file. Open the live https site to pay.'); return; }
  if(typeof Razorpay==='undefined'){
    var o=fxBuildOrder(c,'','Pending payment'); fxLogOrder(o);
    fxShowSuccess(o,'Payment couldn\u2019t load here. Tap below to send your order on WhatsApp and we\u2019ll share a secure payment link.');
    return;
  }
  if(pay){pay.disabled=true;pay.textContent='Opening Razorpay\u2026';}
  try{
    var rzp=new Razorpay({
      key:FX_CONFIG.razorpayKey, amount:fxTotal()*100, currency:FX_CONFIG.currency,
      name:FX_CONFIG.brand, description:fxItems().map(function(i){return i.name+' \u00D7 '+i.qty;}).join(', ').slice(0,250),
      prefill:{name:c.name,email:c.email,contact:'+91'+c.phone},
      notes:{category:'Gemstone Bracelet Cart',items:fxItems().map(function(i){return i.sku+'x'+i.qty;}).join(',')},
      theme:{color:'#6E1423'},
      modal:{ondismiss:function(){ if(pay){pay.disabled=false;pay.textContent='Pay '+money(fxTotal())+' with Razorpay';} }},
      handler:function(resp){
        var order=fxBuildOrder(c,resp.razorpay_payment_id,'Paid');
        fxLogOrder(order);
        try{ if(window.top&&window.top.fbq)window.top.fbq('track','Purchase',{value:fxTotal(),currency:'INR'}); }catch(e){}
        fxCart={}; updateFab(false); renderCart();
        fxShowSuccess(order,'Thank you for your order. We\u2019ll ship within 1\u20132 working days. A copy of your order is saved.');
      }
    });
    rzp.on('payment.failed',function(r){
      if(pay){pay.disabled=false;pay.textContent='Pay '+money(fxTotal())+' with Razorpay';}
      alert('Payment failed: '+((r&&r.error&&r.error.description)||'please try again.'));
    });
    rzp.open();
  }catch(e){
    if(pay){pay.disabled=false;pay.textContent='Pay '+money(fxTotal())+' with Razorpay';}
    alert('Could not open Razorpay: '+e.message);
  }
}

function addToCart(sku,btn){
  if(btn){
    btn.classList.remove('is-done');
    btn.classList.add('is-loading');
    setTimeout(function(){ btn.classList.remove('is-loading'); btn.classList.add('is-done'); },720);
    setTimeout(function(){ btn.classList.remove('is-done'); },1950);
  }
  setTimeout(function(){
    fxCart[sku]=(fxCart[sku]||0)+1;
    updateFab(true);
    renderCart();
    if(typeof fxResetPanes==='function')fxResetPanes();
    openCart();
    /* TRIGGER: exactly two bracelets in the cart → celebrate once */
    if(cartCountTotal()===2 && !fxCelebrated){ fxCelebrated=true; setTimeout(fxCelebrate,420); }
  },720);
}

/* ── celebration: gift box + confetti, then auto-apply HAPPY10 ── */
function fxConfettiBurst(){
  var c=document.getElementById('fx-confetti'); if(!c)return;
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var colors=['#c9a24a','#6E1423','#4f9e6a','#e08aa0','#2b4a8c','#F4DD9B'];
  for(var i=0;i<30;i++){
    var p=document.createElement('span'); p.className='fx-conf-piece';
    p.style.left=(50+(Math.random()*60-30))+'%';
    p.style.background=colors[i%colors.length];
    p.style.setProperty('--dx',(Math.random()*220-110)+'px');
    p.style.setProperty('--dy',(-130-Math.random()*170)+'px');
    p.style.setProperty('--rot',(Math.random()*720-360)+'deg');
    p.style.animationDelay=(Math.random()*0.15)+'s';
    c.appendChild(p);
    (function(el){ setTimeout(function(){ if(el.parentNode)el.parentNode.removeChild(el); },1700); })(p);
  }
}
function fxCelebrate(){
  var ov=document.getElementById('fx-celebrate'); if(!ov)return;
  ov.classList.remove('opened','reward');
  ov.classList.add('show');
  fxConfettiBurst();
  setTimeout(function(){ ov.classList.add('opened'); fxConfettiBurst(); },650);   // lid pops off
  setTimeout(function(){                                                          // reward + auto-discount
    fxCoupon='HAPPY10';
    renderCart();
    ov.classList.add('reward');
  },1500);
}
function fxCelebrateClose(){ var ov=document.getElementById('fx-celebrate'); if(ov)ov.classList.remove('show','opened','reward'); }

/* ── Init ── */
injectCartUI();
renderCart();
updateFab(false);
switchSection('crystal',document.querySelector('.fx-sb-item.active'));
document.querySelectorAll('.fx-sb-item').forEach(function(item){
  item.addEventListener('keydown',function(e){
    if(e.key==='Enter'||e.key===' '){e.preventDefault();item.click();}
  });
});
document.addEventListener('keydown',function(e){ if(e.key==='Escape'){ fxCelebrateClose(); closeCart(); } });
</script>

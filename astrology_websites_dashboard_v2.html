const panels=document.getElementById('panels');
tabs.forEach((t,i)=>{
  const btn=document.createElement('button');
  btn.className='ntab'+(i===0?' on':'');
  btn.innerHTML=`<i class="ti ${t.icon}" aria-hidden="true" style="margin-right:4px"></i>${t.label}`;
  btn.onclick=()=>{
    document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('on'));

    btn.classList.add('on');
    document.getElementById('p-'+t.id).classList.add('on');
  };

  pnl.id='p-'+t.id;
  pnl.className='pnl'+(i===0?' on':'');
  panels.appendChild(pnl);
});

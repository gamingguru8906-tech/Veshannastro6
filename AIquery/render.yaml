# Render.com blueprint for the Maya backend.
# In Render: New + > Blueprint > connect this repo. Render reads this file.
# After it deploys, add the secret GEMINI_API_KEY in the service's Environment tab.
services:
  # Keep this aligned with vercel.json's existing production destination.
  - type: web
    name: veshannastro6
    runtime: node
    plan: free
    # If this file is at the repo root, remove rootDir.
    # If the "AI query" folder is a subfolder of the repo, set it here:
    rootDir: AIquery
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this secret manually in the dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: DATABASE_URL
        sync: false          # same PostgreSQL database used by the admin app
      - key: SHEET_WEBHOOK_URL
        sync: false          # existing Maaya lead logger Apps Script /exec URL
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://veshannastro.com,https://www.veshannastro.com
      - key: RATE_MAX
        value: "20"
